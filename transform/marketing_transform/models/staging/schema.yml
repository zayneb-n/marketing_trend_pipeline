version: 2

models:
  - name: stg_trends
    description: "Cleaned Google Trends data — one row per keyword per date"
    columns:
      - name: keyword
        description: "Marketing keyword tracked"
        tests:
          - not_null
      - name: interest
        description: "Google search interest score 0-100"
        tests:
          - not_null

  - name: stg_articles
    columns:
      - name: keyword
        tests:
          - not_null
      - name: url
        tests:
          - not_null
          - unique
      - name: title
        tests:
          - not_null

  - name: stg_keywords
    description: "Active keywords managed by the marketing team"
    columns:
      - name: keyword
        description: "The tracked keyword"
        tests:
          - not_null
          - unique
      - name: active
        description: "Whether this keyword is currently being tracked"
        tests:
          - not_null